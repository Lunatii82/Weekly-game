<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floppy Panda</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #2d2d2d;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
    user-select: none;
    -webkit-user-select: none;
  }
  canvas {
    display: block;
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    cursor: pointer;
    touch-action: none;
  }
</style>
</head>
<body>
<canvas id="c" width="480" height="520"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// --- Physics ---
const GRAVITY       = 0.07;
const JUMP          = -3.0;
const SPEED         = 1.5;
const PIPE_INTERVAL = 160;
const GAP           = 150;
const PIPE_W        = 52;
const GROUND_H      = 30;
const W             = 480;
const H             = 520;
const FLOOR         = H - GROUND_H;
const PANDA_R       = 22;
const PANDA_X       = 110;

// --- State ---
let state   = 'idle'; // 'idle' | 'playing' | 'dead'
let score   = 0;
let best    = parseInt(localStorage.getItem('flappypanda_best') || '0');
let bestDate = localStorage.getItem('flappypanda_best_date') || '';
let vy      = 0;
let py      = H / 2 - 20;
let pipes   = [];
let frame   = 0;
let clouds  = [];
let deathTimer = 0;

// Pre-generate static clouds
function initClouds() {
  clouds = [
    { x: 60,  y: 60,  rx: 38, ry: 18, a: 0.55 },
    { x: 220, y: 40,  rx: 52, ry: 22, a: 0.45 },
    { x: 380, y: 80,  rx: 44, ry: 18, a: 0.50 },
    { x: 140, y: 110, rx: 30, ry: 14, a: 0.35 },
    { x: 320, y: 130, rx: 36, ry: 16, a: 0.40 },
  ];
}
initClouds();

// --- Input ---
function jump() {
  if (state === 'idle') {
    startGame();
    return;
  }
  if (state === 'dead') {
    if (deathTimer > 40) resetGame();
    return;
  }
  if (state === 'playing') {
    vy = JUMP;
  }
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); jump(); }
});
canvas.addEventListener('mousedown', e => { e.preventDefault(); jump(); });
canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, { passive: false });

// --- Game control ---
function startGame() {
  state  = 'playing';
  score  = 0;
  frame  = 0;
  pipes  = [];
  vy     = JUMP;
  py     = H / 2 - 20;
}

function resetGame() {
  state  = 'idle';
  score  = 0;
  frame  = 0;
  pipes  = [];
  vy     = 0;
  py     = H / 2 - 20;
  deathTimer = 0;
}

function die() {
  if (state !== 'playing') return;
  state = 'dead';
  deathTimer = 0;
  if (score > best) {
    best = score;
    const now = new Date();
    bestDate = `${String(now.getDate()).padStart(2,'0')}/${String(now.getMonth()+1).padStart(2,'0')}/${now.getFullYear()}`;
    localStorage.setItem('flappypanda_best', best);
    localStorage.setItem('flappypanda_best_date', bestDate);
  }
}

// --- Pipes ---
function spawnPipe() {
  const minTop = 60;
  const maxTop = FLOOR - GAP - 60;
  const topH   = minTop + Math.random() * (maxTop - minTop);
  pipes.push({ x: W + PIPE_W, topH, scored: false });
}

// --- Collision ---
function circleRect(cx, cy, r, rx, ry, rw, rh) {
  const nearX = Math.max(rx, Math.min(cx, rx + rw));
  const nearY = Math.max(ry, Math.min(cy, ry + rh));
  const dx = cx - nearX;
  const dy = cy - nearY;
  return dx * dx + dy * dy < r * r;
}

// --- Draw helpers ---
function drawBackground() {
  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, FLOOR);
  grad.addColorStop(0,   '#87CEEB');
  grad.addColorStop(0.7, '#B8E4C9');
  grad.addColorStop(1,   '#90D4A0');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, FLOOR);

  // Clouds
  ctx.save();
  for (const cl of clouds) {
    ctx.globalAlpha = cl.a;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.ellipse(cl.x, cl.y, cl.rx, cl.ry, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cl.x - cl.rx * 0.4, cl.y + 4, cl.rx * 0.65, cl.ry * 0.8, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cl.x + cl.rx * 0.4, cl.y + 2, cl.rx * 0.55, cl.ry * 0.7, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.restore();

  // Ground
  ctx.fillStyle = '#5A8A3C';
  ctx.fillRect(0, FLOOR, W, GROUND_H);
  ctx.fillStyle = '#4A7A2C';
  ctx.fillRect(0, FLOOR, W, 6);
  // Grass tufts
  ctx.fillStyle = '#6AAA4C';
  for (let gx = 10; gx < W; gx += 28) {
    ctx.beginPath();
    ctx.arc(gx, FLOOR + 3, 5, Math.PI, 0);
    ctx.fill();
  }
}

function drawBamboo(x, topH) {
  const botY   = topH + GAP;
  const botH   = FLOOR - botY;

  function drawStem(sx, sy, sw, sh) {
    if (sh <= 0) return;
    // Main body
    const g = ctx.createLinearGradient(sx, 0, sx + sw, 0);
    g.addColorStop(0,    '#4CAF50');
    g.addColorStop(0.3,  '#66BB6A');
    g.addColorStop(0.6,  '#81C784');
    g.addColorStop(1,    '#388E3C');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.roundRect(sx, sy, sw, sh, 4);
    ctx.fill();

    // Segments
    ctx.strokeStyle = '#2E7D32';
    ctx.lineWidth = 1.5;
    const seg = 28;
    for (let seg_y = sy + seg; seg_y < sy + sh - 4; seg_y += seg) {
      ctx.beginPath();
      ctx.moveTo(sx + 2, seg_y);
      ctx.lineTo(sx + sw - 2, seg_y);
      ctx.stroke();
      // Joint bump
      ctx.fillStyle = '#388E3C';
      ctx.fillRect(sx - 2, seg_y - 3, sw + 4, 6);
      ctx.fillStyle = g;
      ctx.fillRect(sx, seg_y - 2, sw, 4);
    }

    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.beginPath();
    ctx.roundRect(sx + 4, sy + 6, sw * 0.25, sh - 12, 3);
    ctx.fill();
  }

  function drawLeaves(lx, ly, isTop) {
    const dir = isTop ? 1 : -1;
    // Left leaf
    ctx.save();
    ctx.translate(lx - 4, ly);
    ctx.rotate(dir * -0.45);
    ctx.fillStyle = '#66BB6A';
    ctx.beginPath();
    ctx.ellipse(0, 0, 22, 9, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#388E3C';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(-20, 0);
    ctx.lineTo(20, 0);
    ctx.stroke();
    ctx.restore();

    // Right leaf
    ctx.save();
    ctx.translate(lx + PIPE_W + 4, ly);
    ctx.rotate(dir * 0.45);
    ctx.fillStyle = '#81C784';
    ctx.beginPath();
    ctx.ellipse(0, 0, 22, 9, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#388E3C';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(-20, 0);
    ctx.lineTo(20, 0);
    ctx.stroke();
    ctx.restore();
  }

  // Top bamboo (hangs from top)
  drawStem(x, 0, PIPE_W, topH);
  drawLeaves(x, topH, true);

  // Bottom bamboo
  drawStem(x, botY, PIPE_W, botH);
  drawLeaves(x, botY, false);
}

function drawPanda(px_, py_, vy_) {
  const angle = Math.max(-0.4, Math.min(0.9, vy_ * 0.055));

  ctx.save();
  ctx.translate(px_, py_);
  ctx.rotate(angle);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.10)';
  ctx.beginPath();
  ctx.ellipse(2, 26, 18, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body
  const bodyGrad = ctx.createRadialGradient(-4, -6, 4, 0, 0, 26);
  bodyGrad.addColorStop(0, '#FFFFFF');
  bodyGrad.addColorStop(1, '#D8D8D8');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.ellipse(0, 2, 21, 22, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#BBBBBB';
  ctx.lineWidth = 0.8;
  ctx.stroke();

  // Ears (black, behind eyes level)
  ctx.fillStyle = '#222222';
  ctx.beginPath();
  ctx.arc(-13, -18, 9, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(13, -18, 9, 0, Math.PI * 2);
  ctx.fill();
  // Inner ear
  ctx.fillStyle = '#3a3a3a';
  ctx.beginPath();
  ctx.arc(-13, -18, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(13, -18, 5, 0, Math.PI * 2);
  ctx.fill();

  // Eye patches (black)
  ctx.fillStyle = '#111111';
  ctx.beginPath();
  ctx.ellipse(-8, -6, 8, 7, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(8, -6, 8, 7, 0.3, 0, Math.PI * 2);
  ctx.fill();

  // Eyes (white)
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.arc(-8, -7, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(8, -7, 4, 0, Math.PI * 2);
  ctx.fill();

  // Pupils
  ctx.fillStyle = '#111111';
  ctx.beginPath();
  ctx.arc(-7.5, -7, 2.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(8.5, -7, 2.2, 0, Math.PI * 2);
  ctx.fill();

  // Eye shines
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.arc(-6.5, -8, 1, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(9.5, -8, 1, 0, Math.PI * 2);
  ctx.fill();

  // Nose / muzzle area
  ctx.fillStyle = '#F4C2C2';
  ctx.beginPath();
  ctx.ellipse(0, 3, 9, 7, 0, 0, Math.PI * 2);
  ctx.fill();

  // Nose tip
  ctx.fillStyle = '#C48080';
  ctx.beginPath();
  ctx.ellipse(0, 1, 4, 2.5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Mouth
  ctx.strokeStyle = '#A06060';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(-4, 5);
  ctx.quadraticCurveTo(0, 9, 4, 5);
  ctx.stroke();

  // Small paws at bottom
  ctx.fillStyle = '#D0D0D0';
  ctx.strokeStyle = '#AAAAAA';
  ctx.lineWidth = 0.7;
  // Left paw
  ctx.beginPath();
  ctx.ellipse(-10, 18, 7, 4, 0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  // Right paw
  ctx.beginPath();
  ctx.ellipse(10, 18, 7, 4, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // Belly patch
  ctx.fillStyle = 'rgba(220,220,220,0.5)';
  ctx.beginPath();
  ctx.ellipse(0, 8, 10, 10, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawScore() {
  const txt = String(score);
  ctx.save();
  const pad = 14;
  const w   = Math.max(60, txt.length * 22 + pad * 2);
  const x   = W / 2 - w / 2;
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  ctx.beginPath();
  ctx.roundRect(x, 14, w, 42, 10);
  ctx.fill();
  ctx.fillStyle = '#333';
  ctx.font = 'bold 28px "Segoe UI", Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(txt, W / 2, 36);
  ctx.restore();
}

function drawOverlay(lines, sub) {
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2;
  const cy = H / 2 - 20;

  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  ctx.beginPath();
  ctx.roundRect(cx - 160, cy - 70, 320, 160 + (sub ? 36 : 0), 18);
  ctx.fill();

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Icon line
  ctx.font = '38px serif';
  ctx.fillText('🐼', cx, cy - 40);

  // Main text
  ctx.fillStyle = '#222';
  ctx.font = 'bold 26px "Segoe UI", Arial, sans-serif';
  ctx.fillText(lines[0], cx, cy + 4);

  if (lines[1]) {
    ctx.font = '16px "Segoe UI", Arial, sans-serif';
    ctx.fillStyle = '#555';
    ctx.fillText(lines[1], cx, cy + 32);
  }

  if (sub) {
    ctx.font = '13px "Segoe UI", Arial, sans-serif';
    ctx.fillStyle = '#888';
    ctx.fillText(sub, cx, cy + 60);
  }
  ctx.restore();
}

function drawDead() {
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2;
  const cy = H / 2 - 20;

  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.93)';
  ctx.beginPath();
  ctx.roundRect(cx - 160, cy - 80, 320, 196, 18);
  ctx.fill();

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.font = '32px serif';
  ctx.fillText('💀', cx, cy - 48);

  ctx.font = 'bold 26px "Segoe UI", Arial, sans-serif';
  ctx.fillStyle = '#CC3333';
  ctx.fillText('Game Over', cx, cy - 10);

  ctx.font = '17px "Segoe UI", Arial, sans-serif';
  ctx.fillStyle = '#333';
  ctx.fillText(`Score : ${score}`, cx, cy + 24);

  ctx.fillStyle = score >= best ? '#E67E00' : '#666';
  ctx.fillText(`Meilleur : ${best}`, cx, cy + 50);

  if (bestDate) {
    ctx.font = '12px "Segoe UI", Arial, sans-serif';
    ctx.fillStyle = '#999';
    ctx.fillText(bestDate, cx, cy + 70);
  }

  if (deathTimer > 40) {
    ctx.font = '13px "Segoe UI", Arial, sans-serif';
    ctx.fillStyle = '#888';
    ctx.fillText('Clic / Espace pour rejouer', cx, cy + (bestDate ? 92 : 84));
  }

  ctx.restore();
}

// --- Main loop ---
function update() {
  if (state !== 'playing') {
    if (state === 'dead') deathTimer++;
    return;
  }

  frame++;
  vy += GRAVITY;
  py += vy;

  // Floor / ceiling
  if (py + PANDA_R >= FLOOR) { py = FLOOR - PANDA_R; die(); return; }
  if (py - PANDA_R <= 0)     { py = PANDA_R; die(); return; }

  // Spawn pipes
  if (frame % PIPE_INTERVAL === 0) spawnPipe();

  // Move & check pipes
  for (let i = pipes.length - 1; i >= 0; i--) {
    const p = pipes[i];
    p.x -= SPEED;

    // Score
    if (!p.scored && p.x + PIPE_W < PANDA_X - PANDA_R) {
      p.scored = true;
      score++;
    }

    // Collision
    const hit =
      circleRect(PANDA_X, py, PANDA_R - 3, p.x, 0,         PIPE_W, p.topH) ||
      circleRect(PANDA_X, py, PANDA_R - 3, p.x, p.topH + GAP, PIPE_W, FLOOR - (p.topH + GAP));

    if (hit) { die(); return; }

    // Remove off-screen
    if (p.x + PIPE_W < -10) pipes.splice(i, 1);
  }
}

function render() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();

  // Draw pipes
  for (const p of pipes) drawBamboo(p.x, p.topH);

  // Draw panda
  drawPanda(PANDA_X, py, vy);

  // Overlays
  if (state === 'idle') {
    drawOverlay(
      ['Floppy Panda', 'Clic / Espace pour démarrer'],
      best > 0 ? `Meilleur : ${best}${bestDate ? '  •  ' + bestDate : ''}` : null
    );
  } else if (state === 'dead') {
    drawDead();
  } else {
    drawScore();
  }
}

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
