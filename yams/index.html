<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yam's 🐼</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== Accueil ===== -->
<div id="screen-home" class="screen active">
  <div class="panda-card">
    <div class="card-icon">🐼</div>
    <h1 class="card-title">Yam's</h1>
    <p class="card-sub">Multijoueur en ligne · 2 à 6 joueurs</p>
    <input type="text" id="inp-pseudo" class="panda-input" placeholder="Ton pseudo" maxlength="20" autocomplete="off">
    <div class="home-actions">
      <button id="btn-create" class="btn-green">🎲 Créer une partie</button>
      <button id="btn-join-toggle" class="btn-outline">🔗 Rejoindre une partie</button>
    </div>
    <div id="join-panel" class="join-panel hidden">
      <input type="text" id="inp-code" class="panda-input code-input" placeholder="CODE" maxlength="4" autocomplete="off">
      <button id="btn-join" class="btn-green" style="width:auto;padding:11px 18px;">→</button>
    </div>
    <p id="home-error" class="error-msg"></p>
    <a href="../arcade/" class="back-link">← Lunatii Arcade</a>
  </div>
</div>

<!-- ===== Lobby ===== -->
<div id="screen-lobby" class="screen">
  <div class="panda-card">
    <div class="card-icon">🐼</div>
    <h2 class="card-title" style="font-size:1.7rem">Salle d'attente</h2>
    <div class="code-badge">Code&nbsp;: <strong id="lob-code">----</strong></div>
    <p class="card-sub" style="margin-top:6px">Partagez ce code avec vos amis !</p>
    <div id="lob-players" class="player-list"></div>
    <button id="btn-start" class="btn-green hidden">▶ Lancer la partie</button>
    <p id="lob-hint" class="hint-text">En attente de joueurs... (min. 2)</p>
    <button id="btn-leave" class="btn-link" style="margin-top:14px">← Quitter</button>
  </div>
</div>

<!-- ===== Jeu ===== -->
<div id="screen-game" class="screen">
  <div class="game-topbar">
    <a href="../arcade/" class="topbar-back" title="Arcade">🐼</a>
    <span id="g-turn" class="turn-text">—</span>
    <span id="g-rolls" class="rolls-badge">🎲 3</span>
  </div>
  <div class="dice-zone">
    <div class="dice-row">
      <canvas class="die-cv" id="d0" width="80" height="80"></canvas>
      <canvas class="die-cv" id="d1" width="80" height="80"></canvas>
      <canvas class="die-cv" id="d2" width="80" height="80"></canvas>
      <canvas class="die-cv" id="d3" width="80" height="80"></canvas>
      <canvas class="die-cv" id="d4" width="80" height="80"></canvas>
    </div>
    <button id="btn-roll" class="btn-roll" disabled>Lancer 🎲</button>
  </div>
  <div class="score-wrap">
    <table id="score-tbl" class="score-tbl">
      <thead><tr id="score-head"><th class="lbl-col">Combinaison</th></tr></thead>
      <tbody id="score-body"></tbody>
    </table>
  </div>
</div>

<!-- ===== Fin ===== -->
<div id="screen-end" class="screen">
  <div class="panda-card">
    <div class="card-icon">🏆</div>
    <h2 class="card-title">Partie terminée !</h2>
    <p class="card-sub">Classement final</p>
    <div id="end-podium" class="podium"></div>
    <button id="btn-replay" class="btn-green" style="margin-top:16px">🎲 Nouvelle partie</button>
    <a href="../arcade/" class="back-link">← Lunatii Arcade</a>
  </div>
</div>

<script>
/*
  TABLE SUPABASE REQUISE :
  CREATE TABLE yams_rooms (
    id text PRIMARY KEY,
    state jsonb,
    updated_at timestamptz DEFAULT now()
  );
  ALTER TABLE yams_rooms ENABLE ROW LEVEL SECURITY;
  CREATE POLICY "open" ON yams_rooms FOR ALL USING (true) WITH CHECK (true);
*/

const SUPABASE_URL = 'https://rqybsymsxjhblpmwwkod.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Kzg89oIvbVe3VKbV9efA6g_Ip-4mFuH';

// ===== Identité joueur =====
let myId = localStorage.getItem('yams_pid') || (()=>{
  const id = typeof crypto!=='undefined'&&crypto.randomUUID
    ? crypto.randomUUID()
    : Date.now().toString(36)+Math.random().toString(36).slice(2);
  localStorage.setItem('yams_pid', id);
  return id;
})();
let myName = '';
let roomId  = '';
let gs      = null; // game state (local copy)
let pollTmr = null;
let isMyTurn = false;
let rolling  = false;

// ===== Catégories =====
const SCOREABLE = ['ones','twos','threes','fours','fives','sixes',
  'threeOfAKind','fourOfAKind','fullHouse','smallStraight','largeStraight','yahtzee','chance'];

const CATS = [
  {id:'_sup',   label:'— Section Haute —',           type:'section'},
  {id:'ones',   label:'As',    hint:'Somme des 1',   type:'score'},
  {id:'twos',   label:'Deux',  hint:'Somme des 2',   type:'score'},
  {id:'threes', label:'Trois', hint:'Somme des 3',   type:'score'},
  {id:'fours',  label:'Quatre',hint:'Somme des 4',   type:'score'},
  {id:'fives',  label:'Cinq',  hint:'Somme des 5',   type:'score'},
  {id:'sixes',  label:'Six',   hint:'Somme des 6',   type:'score'},
  {id:'_uTotal',label:'Sous-total',                  type:'calc'},
  {id:'_bonus', label:'Bonus +35',hint:'si ≥ 63 pts',type:'calc'},
  {id:'_slo',   label:'— Section Basse —',           type:'section'},
  {id:'threeOfAKind', label:'Brelan',        hint:'3 identiques → somme', type:'score'},
  {id:'fourOfAKind',  label:'Carré',         hint:'4 identiques → somme', type:'score'},
  {id:'fullHouse',    label:'Full House',    hint:'3+2 → 25 pts',        type:'score'},
  {id:'smallStraight',label:'Petite Suite',  hint:'4 consécutifs → 30',  type:'score'},
  {id:'largeStraight',label:'Grande Suite',  hint:'5 consécutifs → 40',  type:'score'},
  {id:'yahtzee',      label:"Yam's",         hint:'5 identiques → 50',   type:'score'},
  {id:'chance',       label:'Chance',        hint:'Somme de tous les dés',type:'score'},
  {id:'_total', label:'TOTAL', type:'total'},
];

// ===== Calcul des scores =====
function calcScore(cat, dice) {
  const cnt = Array(7).fill(0);
  dice.forEach(v => cnt[v]++);
  const sum = dice.reduce((a,b)=>a+b, 0);
  switch(cat) {
    case 'ones':   return cnt[1];
    case 'twos':   return cnt[2]*2;
    case 'threes': return cnt[3]*3;
    case 'fours':  return cnt[4]*4;
    case 'fives':  return cnt[5]*5;
    case 'sixes':  return cnt[6]*6;
    case 'threeOfAKind': return cnt.some(c=>c>=3)?sum:0;
    case 'fourOfAKind':  return cnt.some(c=>c>=4)?sum:0;
    case 'fullHouse':    return (cnt.some(c=>c===3)&&cnt.some(c=>c===2))?25:0;
    case 'smallStraight':{
      const u=[...new Set(dice)].sort((a,b)=>a-b).join('');
      return (u.includes('1234')||u.includes('2345')||u.includes('3456'))?30:0;
    }
    case 'largeStraight':{
      const u=[...new Set(dice)].sort((a,b)=>a-b);
      return (u.length===5&&u[4]-u[0]===4)?40:0;
    }
    case 'yahtzee': return cnt.some(c=>c===5)?50:0;
    case 'chance':  return sum;
  }
  return 0;
}
function upperTotal(s){ return ['ones','twos','threes','fours','fives','sixes'].reduce((t,c)=>t+(s[c]??0),0); }
function lowerTotal(s){ return ['threeOfAKind','fourOfAKind','fullHouse','smallStraight','largeStraight','yahtzee','chance'].reduce((t,c)=>t+(s[c]??0),0); }
function grandTotal(s){ const u=upperTotal(s); return u+(u>=63?35:0)+lowerTotal(s); }
function initScores(){ return Object.fromEntries(SCOREABLE.map(c=>[c,null])); }
function gameOver(state){ return state.players.every(p=>SCOREABLE.every(c=>p.scores[c]!==null)); }

// ===== Supabase helpers =====
async function sfetch(method, path, body) {
  const h = { 'apikey':SUPABASE_KEY, 'Authorization':'Bearer '+SUPABASE_KEY, 'Content-Type':'application/json' };
  if (method==='POST') h['Prefer']='resolution=merge-duplicates';
  const opts = {method, headers:h};
  if (body!==undefined) opts.body = JSON.stringify(body);
  try {
    const r = await fetch(SUPABASE_URL+path, opts);
    if (!r.ok){ console.error('SB',r.status,await r.text()); return null; }
    const t = await r.text();
    return t ? JSON.parse(t) : true;
  } catch(e){ console.error(e); return null; }
}
async function getRoom(id){
  const d = await sfetch('GET',`/rest/v1/yams_rooms?id=eq.${id}&select=state`);
  return d&&d[0] ? d[0].state : null;
}
async function saveRoom(state){
  return sfetch('PATCH',`/rest/v1/yams_rooms?id=eq.${roomId}`,{state,updated_at:new Date().toISOString()});
}

// ===== Polling =====
function startPoll(){
  stopPoll();
  pollTmr = setInterval(async()=>{
    const ns = await getRoom(roomId);
    if (!ns) return;
    if (JSON.stringify(ns)!==JSON.stringify(gs)){ gs=ns; render(); }
  }, 1500);
}
function stopPoll(){ if(pollTmr){clearInterval(pollTmr);pollTmr=null;} }

// ===== Screens =====
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== Canvas roundRect polyfill =====
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r);this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    this.lineTo(x+r,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r);
    this.lineTo(x,y+r);this.quadraticCurveTo(x,y,x+r,y);this.closePath();
  };
}

// ===== Dessin des dés =====
const DOTS = {
  1:[[40,40]],
  2:[[26,26],[54,54]],
  3:[[26,26],[40,40],[54,54]],
  4:[[26,26],[54,26],[26,54],[54,54]],
  5:[[26,26],[54,26],[40,40],[26,54],[54,54]],
  6:[[26,21],[54,21],[26,40],[54,40],[26,59],[54,59]],
};
const DOTS1_EARS = [[40,44]]; // décalé pour laisser place aux oreilles

function drawDie(id, value, held, active, flash){
  const cv = document.getElementById(id);
  if(!cv) return;
  const c = cv.getContext('2d');
  c.clearRect(0,0,80,80);
  const hasEars = (value===1 && !flash);
  const faceTop = hasEars ? 12 : 5;
  const faceH   = 75 - faceTop;

  // Oreilles panda sur le dé 1
  if(hasEars){
    c.fillStyle='#222';
    c.beginPath(); c.ellipse(17,9,9,8,-0.25,0,Math.PI*2); c.fill();
    c.beginPath(); c.ellipse(63,9,9,8, 0.25,0,Math.PI*2); c.fill();
    c.fillStyle='#555';
    c.beginPath(); c.ellipse(17,9,5,4,0,0,Math.PI*2); c.fill();
    c.beginPath(); c.ellipse(63,9,5,4,0,0,Math.PI*2); c.fill();
  }

  // Face du dé
  if(held){         c.fillStyle='#e8f5e9'; c.strokeStyle='#4CAF50'; c.lineWidth=3;
  }else if(flash){  c.fillStyle='#fffde7'; c.strokeStyle='#bbb';    c.lineWidth=2;
  }else if(!active){c.fillStyle='#e8e8e8'; c.strokeStyle='#bbb';    c.lineWidth=2;
  }else{            c.fillStyle='#ffffff'; c.strokeStyle='#333';    c.lineWidth=2; }
  c.beginPath();
  c.roundRect(5, faceTop, 70, faceH, 10);
  c.fill(); c.stroke();

  // Points
  c.fillStyle = held ? '#2E7D32' : (active ? '#111' : '#aaa');
  const pts = hasEars ? DOTS1_EARS : (DOTS[value]||[]);
  pts.forEach(([x,y])=>{ c.beginPath(); c.arc(x,y,5.5,0,Math.PI*2); c.fill(); });

  // Label "Gardé"
  if(held){
    c.fillStyle='#4CAF50'; c.font='bold 8px sans-serif';
    c.textAlign='center'; c.textBaseline='bottom';
    c.fillText('GARDÉ',40,79);
  }
}

async function rollAnim(held){
  return new Promise(res=>{
    let t=0;
    const iv=setInterval(()=>{
      for(let i=0;i<5;i++) if(!held[i]) drawDie(`d${i}`,Math.ceil(Math.random()*6),false,true,true);
      if(++t>=8){clearInterval(iv);res();}
    },50);
  });
}

// ===== Logique du jeu =====
async function createRoom(){
  const code = Array.from({length:4},()=>'ABCDEFGHJKLMNPQRSTUVWXYZ'[Math.floor(Math.random()*23)]).join('');
  const state = {
    phase:'waiting', host:myId,
    players:[{id:myId,name:myName,scores:initScores()}],
    currentPlayerIndex:0,
    dice:[1,1,1,1,1], held:[false,false,false,false,false],
    rollsLeft:3, rollCount:0,
  };
  const res = await sfetch('POST','/rest/v1/yams_rooms',{id:code,state,updated_at:new Date().toISOString()});
  if(res===null){ showError('Impossible de créer la partie.\n(Table yams_rooms introuvable ?)'); return; }
  roomId=code; gs=state;
  showScreen('screen-lobby'); renderLobby(); startPoll();
}

async function joinRoom(code){
  code=code.toUpperCase();
  const state = await getRoom(code);
  if(!state){ showError('Partie introuvable.'); return; }
  if(state.phase!=='waiting'){ showError('Cette partie a déjà commencé.'); return; }
  if(state.players.length>=6){ showError('Partie pleine (6/6).'); return; }
  if(!state.players.find(p=>p.id===myId)){
    state.players.push({id:myId,name:myName,scores:initScores()});
    await sfetch('PATCH',`/rest/v1/yams_rooms?id=eq.${code}`,{state,updated_at:new Date().toISOString()});
  }
  roomId=code; gs=state;
  showScreen('screen-lobby'); renderLobby(); startPoll();
}

async function startGame(){
  if(!gs||gs.phase!=='waiting') return;
  const state = JSON.parse(JSON.stringify(gs));
  state.phase='playing'; state.currentPlayerIndex=0;
  state.dice=[1,2,3,4,5]; state.held=[false,false,false,false,false];
  state.rollsLeft=3; state.rollCount=0;
  await saveRoom(state);
  gs=state; render();
}

async function doRoll(){
  if(!isMyTurn||gs.rollsLeft===0||rolling) return;
  rolling=true;
  document.getElementById('btn-roll').disabled=true;
  const state = JSON.parse(JSON.stringify(gs));
  await rollAnim(state.held);
  for(let i=0;i<5;i++) if(!state.held[i]) state.dice[i]=Math.ceil(Math.random()*6);
  state.rollsLeft--; state.rollCount++;
  gs=state; renderGame();
  await saveRoom(state);
  rolling=false;
}

async function toggleHold(i){
  if(!isMyTurn||gs.rollCount===0) return;
  const state=JSON.parse(JSON.stringify(gs));
  state.held[i]=!state.held[i];
  gs=state; renderGame();
  await saveRoom(state);
}

async function doScore(catId){
  if(!isMyTurn||gs.rollCount===0) return;
  const state=JSON.parse(JSON.stringify(gs));
  const me=state.players[state.currentPlayerIndex];
  if(me.scores[catId]!==null) return;
  me.scores[catId]=calcScore(catId,state.dice);
  if(gameOver(state)){
    state.phase='finished';
  }else{
    state.currentPlayerIndex=(state.currentPlayerIndex+1)%state.players.length;
    state.held=[false,false,false,false,false];
    state.rollsLeft=3; state.rollCount=0;
    state.dice=[1,1,1,1,1];
  }
  gs=state; await saveRoom(state); render();
}

// ===== Rendus =====
function render(){
  if(!gs) return;
  switch(gs.phase){
    case 'waiting':  renderLobby(); break;
    case 'playing':  renderGame();  break;
    case 'finished': renderEnd();   break;
  }
}

function renderLobby(){
  showScreen('screen-lobby');
  document.getElementById('lob-code').textContent=roomId;
  const list=document.getElementById('lob-players');
  list.innerHTML=gs.players.map(p=>`
    <div class="player-item ${p.id===myId?'me':''}">
      <span class="p-dot ${p.id===gs.host?'host':''}"></span>
      ${esc(p.name)} ${p.id===gs.host?'👑':''} ${p.id===myId?'<em style="font-weight:400;color:#888">(toi)</em>':''}
    </div>`).join('');
  const startBtn=document.getElementById('btn-start');
  const hint=document.getElementById('lob-hint');
  if(gs.host===myId){
    if(gs.players.length>=2){ startBtn.classList.remove('hidden'); hint.textContent=`${gs.players.length} joueur(s) — Prêt à lancer !`; }
    else{ startBtn.classList.add('hidden'); hint.textContent='En attente d\'un autre joueur...'; }
  }else{
    startBtn.classList.add('hidden');
    hint.textContent='En attente que l\'hôte lance la partie...';
  }
}

function renderGame(){
  showScreen('screen-game');
  const state=gs;
  const cp=state.players[state.currentPlayerIndex];
  isMyTurn=cp.id===myId;

  const turnEl=document.getElementById('g-turn');
  turnEl.textContent=isMyTurn?"C'est ton tour 🐼":`Tour de ${cp.name} 🐼`;
  turnEl.className='turn-text'+(isMyTurn?' my-turn':'');
  document.getElementById('g-rolls').textContent=`🎲 ${state.rollsLeft}`;

  for(let i=0;i<5;i++){
    drawDie(`d${i}`,state.dice[i],state.held[i],isMyTurn,false);
    const cv=document.getElementById(`d${i}`);
    cv.style.cursor=(isMyTurn&&state.rollCount>0)?'pointer':'default';
    cv.onclick=(isMyTurn&&state.rollCount>0)?(()=>{const j=i;return()=>toggleHold(j);})():null;
  }

  const rollBtn=document.getElementById('btn-roll');
  rollBtn.disabled=!isMyTurn||state.rollsLeft===0||rolling;
  buildScoreTable();
}

function buildScoreTable(){
  const state=gs;
  const head=document.getElementById('score-head');
  const body=document.getElementById('score-body');
  head.innerHTML='<th class="lbl-col">Combinaison</th>'+
    state.players.map((p,i)=>`<th class="pl-col${i===state.currentPlayerIndex?' active-player':''}">${esc(p.name)}${p.id===myId?' ✦':''}</th>`).join('');
  body.innerHTML='';

  for(const cat of CATS){
    const tr=document.createElement('tr');
    tr.className=`row-${cat.type}`;
    const tdL=document.createElement('td');
    tdL.className='lbl-col';
    tdL.textContent=cat.label;
    if(cat.hint){ const sp=document.createElement('span'); sp.className='cat-hint'; sp.textContent=' '+cat.hint; tdL.appendChild(sp); }
    tr.appendChild(tdL);

    if(cat.type==='section'){
      tdL.colSpan=state.players.length+1;
      body.appendChild(tr); continue;
    }

    for(let pi=0;pi<state.players.length;pi++){
      const p=state.players[pi];
      const td=document.createElement('td');
      td.className='score-cell'+(pi===state.currentPlayerIndex?' active-col':'');

      if(cat.type==='calc'){
        if(cat.id==='_uTotal'){
          td.textContent=upperTotal(p.scores);
          td.className+=' scored';
        }else if(cat.id==='_bonus'){
          const ut=upperTotal(p.scores);
          td.textContent=ut>=63?'+35':`${ut}/63`;
          td.className+=ut>=63?' bonus-ok':' bonus-nope';
        }
      }else if(cat.type==='total'){
        td.textContent=grandTotal(p.scores);
        td.className+=' total-cell';
      }else{
        // Catégorie scorable
        const scored=p.scores[cat.id];
        if(scored!==null){
          td.textContent=scored;
          td.className+=(scored===0?' zero':' scored');
        }else if(isMyTurn&&pi===state.currentPlayerIndex&&state.rollCount>0){
          const pot=calcScore(cat.id,state.dice);
          td.textContent=pot;
          td.className+=' potential';
          td.title=`Inscrire ${pot} pts`;
          td.onclick=()=>doScore(cat.id);
        }else{
          td.textContent='—';
        }
      }
      tr.appendChild(td);
    }
    body.appendChild(tr);
  }
}

function renderEnd(){
  showScreen('screen-end');
  stopPoll();
  const sorted=[...gs.players].sort((a,b)=>grandTotal(b.scores)-grandTotal(a.scores));
  const medals=['🥇','🥈','🥉'];
  document.getElementById('end-podium').innerHTML=sorted.map((p,i)=>`
    <div class="podium-row${p.id===myId?' me':''}">
      <span class="podium-medal">${medals[i]||(i+1)+'.'}</span>
      <span class="podium-name">${esc(p.name)}</span>
      <span class="podium-score">${grandTotal(p.scores)} pts</span>
    </div>`).join('');
}

// ===== Utilitaires =====
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showError(msg){ const el=document.getElementById('home-error'); el.textContent=msg; setTimeout(()=>el.textContent='',5000); }

// ===== Événements =====
document.getElementById('btn-create').onclick=()=>{
  myName=document.getElementById('inp-pseudo').value.trim();
  if(!myName){ showError('Entre ton pseudo !'); return; }
  localStorage.setItem('yams_pseudo',myName); createRoom();
};
document.getElementById('btn-join-toggle').onclick=()=>{
  document.getElementById('join-panel').classList.toggle('hidden');
  document.getElementById('inp-code').focus();
};
document.getElementById('btn-join').onclick=()=>{
  myName=document.getElementById('inp-pseudo').value.trim();
  if(!myName){ showError('Entre ton pseudo !'); return; }
  const code=document.getElementById('inp-code').value.trim();
  if(code.length!==4){ showError('Code à 4 lettres requis.'); return; }
  localStorage.setItem('yams_pseudo',myName); joinRoom(code);
};
document.getElementById('inp-code').oninput=()=>{
  document.getElementById('inp-code').value=document.getElementById('inp-code').value.toUpperCase();
};
document.getElementById('inp-code').onkeydown=e=>{
  if(e.key==='Enter') document.getElementById('btn-join').click();
};
document.getElementById('btn-start').onclick=startGame;
document.getElementById('btn-roll').onclick=doRoll;
document.getElementById('btn-leave').onclick=async()=>{
  if(gs&&gs.phase==='waiting'){
    const st=JSON.parse(JSON.stringify(gs));
    st.players=st.players.filter(p=>p.id!==myId);
    if(st.players.length===0){
      await sfetch('DELETE',`/rest/v1/yams_rooms?id=eq.${roomId}`);
    }else{
      if(st.host===myId) st.host=st.players[0].id;
      await sfetch('PATCH',`/rest/v1/yams_rooms?id=eq.${roomId}`,{state:st,updated_at:new Date().toISOString()});
    }
  }
  stopPoll(); roomId=''; gs=null; showScreen('screen-home');
};
document.getElementById('btn-replay').onclick=()=>{
  stopPoll(); roomId=''; gs=null; showScreen('screen-home');
};

// Restaurer pseudo
const saved=localStorage.getItem('yams_pseudo');
if(saved) document.getElementById('inp-pseudo').value=saved;
</script>
