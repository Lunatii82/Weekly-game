// ===== Helpers Supabase =====
async function sfetch(method, path, body){
  const h = { 'apikey':SUPABASE_KEY, 'Authorization':'Bearer '+SUPABASE_KEY, 'Content-Type':'application/json' };
  if (method==='POST') h['Prefer']='resolution=merge-duplicates';
  const opts = {method, headers:h};
  if (body!==undefined) opts.body = JSON.stringify(body);
  try {
    const r = await fetch(SUPABASE_URL+path, opts);
    if (!r.ok){ console.error('SB',r.status,await r.text()); return null; }
    const t = await r.text();
    return t ? JSON.parse(t) : true;
  } catch(e){ console.error(e); return null; }
}
async function getRoom(id){
  const d = await sfetch('GET',`/rest/v1/business_rooms?id=eq.${id}&select=state`);
  return d&&d[0] ? d[0].state : null;
}
async function saveRoom(state){
  validateAllPlayers(state, 'saveRoom');
  saving = true;
  try {
    return await sfetch('PATCH',`/rest/v1/business_rooms?id=eq.${roomId}`,{state,updated_at:new Date().toISOString()});
  } finally {
    saving = false;
  }
}

  stopPoll();
  pollTmr = setInterval(async()=>{

    // ou pendant qu'on attend la confirmation d'une écriture Supabase
    // (sinon on récupère l'ancien état serveur et on perd nos modifs locales).
    if (rolling || saving) return;
    const ns = await getRoom(roomId);
    if (!ns) return;
    if (saving) return; // double-check après l'await
    if (JSON.stringify(ns)!==JSON.stringify(gs)){
      validateAllPlayers(ns, 'poll<-server');
      gs = ns;
      render();
    }
  }, 1500);
}
function stopPoll(){ if(pollTmr){clearInterval(pollTmr);pollTmr=null;} }

// ===== Création du plateau (grille 11x11) =====
// Cases positions: 11x11, sens horaire en partant du coin bas-droit (case 0)
function tilePosition(i){
  // 0..10 bottom row (right to left), 10..20 left column (bottom to top), 20..30 top row (left to right), 30..40 right column (top to bottom)
  if (i <= 10){ return { row:11, col:11 - i }; }
  if (i <= 20){ return { row:11 - (i - 10), col:1 }; }
  if (i <= 30){ return { row:1, col:1 + (i - 20) }; }
  return { row:1 + (i - 30), col:11 };
}
function tileSide(i){
  if (i === 0 || i === 10 || i === 20 || i === 30) return 'corner';
  if (i < 10) return 'bottom';
  if (i < 20) return 'left';
  if (i < 30) return 'top';
  return 'right';
}

function buildBoard(){
  const board = document.getElementById('board');
  board.innerHTML = '';

  // Centre
  const center = document.createElement('div');
  center.className = 'board-center';
  center.id = 'board-center';
  board.appendChild(center);

  for (const t of TILES){
    const pos = tilePosition(t.i);
    const side = tileSide(t.i);
    const el = document.createElement('div');
    el.className = `tile tile-${t.type.replace('corner-','corner ')} side-${side}`;
    el.style.gridRow = pos.row;
    el.style.gridColumn = pos.col;
    el.dataset.idx = t.i;

    if (t.type === 'property'){
      el.innerHTML = `
        <div class="color-band ${t.color}"></div>
        <div class="tile-name">${escapeHtml(t.name)}</div>
        <div class="tile-price">${t.price}🪙</div>
        <div class="houses-row" id="houses-${t.i}"></div>
      `;
    } else if (t.type === 'station' || t.type === 'company' || t.type === 'tax' || t.type === 'carte' || t.type === 'caisse'){
      el.innerHTML = `
        <div class="tile-icon">${t.icon}</div>
        <div class="tile-name">${escapeHtml(t.name)}</div>
        ${t.type==='tax' ? `<div class="tile-price">${t.amount}🪙</div>` : ''}
      `;
    } else if (t.type.startsWith('corner')){
      el.innerHTML = `
        <div class="corner-icon">${t.icon}</div>
        <div class="corner-name">${escapeHtml(t.name)}</div>
      `;
    }
    el.onclick = ()=>showTileInfo(t.i);
    board.appendChild(el);
  }
}

// ===== Rendu plateau (positions/houses/owners) =====
function renderBoard(){
  if (!gs) return;
  // Reset pions
  document.querySelectorAll('.pawn').forEach(p=>p.remove());
  document.querySelectorAll('.owner-flag').forEach(o=>o.remove());

  // Owners + houses
  for (const tile of TILES){
    if (tile.type !== 'property' && tile.type !== 'station' && tile.type !== 'company') continue;
    const owner = findOwner(tile.i);
    const el = document.querySelector(`.tile[data-idx="${tile.i}"]`);
    if (!el) continue;
    if (owner){
      const flag = document.createElement('div');
      flag.className = `owner-flag ${owner.color}`;
      el.appendChild(flag);
    }
    if (tile.type === 'property'){
      const h = gs.houses[tile.i] || 0;
      const houseEl = document.getElementById(`houses-${tile.i}`);
      if (houseEl){
        if (h === 0) houseEl.innerHTML = '';
        else if (h <= 4) houseEl.innerHTML = Array(h).fill('<span class="house">🏠</span>').join('');
        else houseEl.innerHTML = '<span class="house">🏨</span>';
      }
    }
  }

  // Pions joueurs
  for (let pi = 0; pi < gs.players.length; pi++){
    const p = gs.players[pi];
    if (p.bankrupt) continue;
    const pos = tilePosition(p.position);
    const tileEl = document.querySelector(`.tile[data-idx="${p.position}"]`);
    if (!tileEl) continue;
    const pawn = document.createElement('div');
    pawn.className = `pawn ${p.color}`;
    pawn.textContent = '🐼';
    // Offset for multiple pawns on same tile
    const sameCount = gs.players.filter((q,i)=>i<pi && !q.bankrupt && q.position===p.position).length;
    const offsetX = (sameCount % 2) * 14;
    const offsetY = Math.floor(sameCount / 2) * 14;
    pawn.style.left = `${4 + offsetX}px`;
    pawn.style.bottom = `${4 + offsetY}px`;
    if (p.inJail){
      const lock = document.createElement('span');
      lock.className = 'jail-lock';
      lock.textContent = '🔒';
      pawn.appendChild(lock);
    }
    tileEl.appendChild(pawn);
  }

  // Centre
  renderCenter();
}

    if (gs.players.length >= 2){
      startBtn.classList.remove('hidden');
      hint.textContent = `${gs.players.length} joueur(s) — Prêt à lancer !`;
    } else {
      startBtn.classList.add('hidden');
      hint.textContent = 'En attente d\'un autre joueur...';
    }
  } else {
    startBtn.classList.add('hidden');
    hint.textContent = 'En attente que l\'hôte lance la partie...';
  }
}

function renderGame(){
  showScreen('screen-game');
  const cp = gs.players[gs.currentPlayerIndex];
  const isMyTurn = cp && cp.id === myId && !cp.bankrupt;
  const turnEl = document.getElementById('g-turn');
  turnEl.textContent = isMyTurn ? "C'est ton tour 🐼" : `Tour de ${cp ? cp.name : '—'} 🐼`;
  turnEl.className = 'turn-text' + (isMyTurn ? ' my-turn' : '');
  updateTimer();

  renderBoard();
  renderRightPanel();
  renderModalFromState();
}

function renderEnd(){
  showScreen('screen-end');
  stopPoll();
  stopTimer();
  const sorted = [...gs.players].sort((a,b)=>totalCapital(b) - totalCapital(a));
  const medals = ['🥇','🥈','🥉','4.'];
  document.getElementById('end-podium').innerHTML = sorted.map((p,i)=>`
    <div class="podium-row ${p.id===myId?'me':''}">
      <span class="podium-medal">${medals[i]||(i+1)+'.'}</span>
      <span class="podium-name">${escapeHtml(p.name)} ${p.bankrupt?'(faillite)':''}</span>
      <span class="podium-score">${totalCapital(p)} 🪙</span>
    </div>`).join('');
}

// ===== Timer =====
function updateTimer(){
  if (!gs || !gs.startTime) return;
  const elapsed = Date.now() - new Date(gs.startTime).getTime();
  const remaining = Math.max(0, GAME_DURATION_MS - elapsed);
  const m = Math.floor(remaining / 60000);
  const s = Math.floor((remaining % 60000) / 1000);
  const el = document.getElementById('g-timer');
  if (el) el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  if (remaining === 0 && gs.phase === 'playing'){
    if (gs.host === myId) timeoutEndGame();
  }
}
function startTimer(){
  stopTimer();
  timerTmr = setInterval(updateTimer, 1000);
}
function stopTimer(){ if (timerTmr){ clearInterval(timerTmr); timerTmr = null; } }

async function timeoutEndGame(){
  const st = JSON.parse(JSON.stringify(gs));
  st.phase = 'finished';
  st.log = (st.log||[]).concat(['⏱️ Temps écoulé — classement par capital total !']);
  await saveRoom(st);
  gs = st; render();
}

// ===== Logique : helpers =====
function findOwner(tileIdx){
  for (const p of gs.players){
    if (!p.bankrupt && p.properties.includes(tileIdx)) return p;
  }
  return null;
}
function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function totalCapital(p){
  let total = p.money;
  for (const idx of p.properties){
    const t = TILES[idx];
    if (t.type === 'property'){
      total += t.price;
      const h = (gs.houses && gs.houses[idx]) || 0;
      total += h * t.houseCost;
    } else {
      total += 200; // gare/compagnie valeur
    }
  }
  return total;
}
function getRent(state, tileIdx, dice){
  const t = TILES[tileIdx];
  const owner = state.players.find(p=>!p.bankrupt && p.properties.includes(tileIdx));
  if (!owner) return 0;
  if (t.type === 'property'){
    const h = (state.houses && state.houses[tileIdx]) || 0;
    if (h > 0){
      return t.rents[1 + h]; // rents[2..6] for 1..5 houses
    }
    // Pas de maisons : monopoly = 2× base si possède tout le groupe
    const groupIdxs = COLOR_GROUPS[t.color];
    const ownsAll = groupIdxs.every(idx => owner.properties.includes(idx));
    return ownsAll ? t.rents[1] : t.rents[0];
  }
  if (t.type === 'station'){
    const ownCount = STATION_IDX.filter(idx => owner.properties.includes(idx)).length;
    return STATION_RENTS[ownCount - 1] || 0;
  }
  if (t.type === 'company'){
    const ownCount = COMPANY_IDX.filter(idx => owner.properties.includes(idx)).length;
    const mul = ownCount === 2 ? 10 : 4;
    return mul * (dice[0] + dice[1]);
  }
  return 0;
}
function canBuildAny(player){
  for (const color in COLOR_GROUPS){
    const idxs = COLOR_GROUPS[color];
    if (!idxs.every(i => player.properties.includes(i))) continue;
    // tous les niveaux doivent être inférieurs à 5 et il faut équilibrer (max 1 d'écart)
    const counts = idxs.map(i => (gs.houses[i] || 0));
    const minH = Math.min(...counts);
    if (minH >= 5) continue;
    const t = TILES[idxs[0]];
    if (player.money < t.houseCost) continue;
    return true;
  }
  return false;
}
function pickColor(state){
  const taken = new Set(state.players.map(p=>p.color));
  for (const c of ['p1','p2','p3','p4']){
    if (!taken.has(c)) return c;
  }
  return 'p1';
}

// ===== Création / Rejoindre =====
async function createRoom(){
  const code = Array.from({length:4},()=>'ABCDEFGHJKLMNPQRSTUVWXYZ'[Math.floor(Math.random()*23)]).join('');
  const state = {
    phase:'waiting',
    host: myId,
    players: [makePlayer(myId, myName, myColor)],
    houses: {},
    currentPlayerIndex: 0,
    turnPhase: 'preRoll',
    dice: [null, null],
    doubleCount: 0,
    pendingAction: null,
    log: [],
    startTime: null,
  };
  const res = await sfetch('POST','/rest/v1/business_rooms',{id:code,state,updated_at:new Date().toISOString()});
  if (res === null){ showError('Impossible de créer la partie.\n(Table business_rooms introuvable ?)'); return; }
  roomId = code; gs = state;
  showScreen('screen-lobby'); renderLobby(); startPoll();
}

async function joinRoom(code){
  code = code.toUpperCase();
  const state = await getRoom(code);
  if (!state){ showError('Partie introuvable.'); return; }
  if (state.phase !== 'waiting'){ showError('Cette partie a déjà commencé.'); return; }
  if (state.players.length >= 4){ showError('Partie pleine (4/4).'); return; }
  if (!state.players.find(p=>p.id===myId)){
    const color = (myColor && !state.players.find(p=>p.color===myColor)) ? myColor : pickColor(state);
    state.players.push(makePlayer(myId, myName, color));
    await sfetch('PATCH',`/rest/v1/business_rooms?id=eq.${code}`,{state,updated_at:new Date().toISOString()});
  }
  roomId = code; gs = state;
  showScreen('screen-lobby'); renderLobby(); startPoll();
}

function makePlayer(id, name, color){
  return {
    id, name, color,
    money: START_MONEY,
    position: 0,
    properties: [],
    inJail: false,
    jailTurns: 0,
    bankrupt: false,
  };
}

// ===== Validation défensive — pas de fallback silencieux =====
function validatePlayer(player, ctx){
  if (!player){
    console.error(`[BusinessTour] Joueur introuvable — origine: ${ctx}`);
    return false;
  }
  if (typeof player.money !== 'number' || !Number.isFinite(player.money)){
    console.error(`[BusinessTour] Argent corrompu pour "${player.name||player.id}" (valeur: ${JSON.stringify(player.money)}) — origine: ${ctx}`);
    return false;
  }
  if (typeof player.position !== 'number'){
    console.error(`[BusinessTour] Position corrompue pour "${player.name||player.id}" (valeur: ${JSON.stringify(player.position)}) — origine: ${ctx}`);
    return false;
  }
  if (!Array.isArray(player.properties)){
    console.error(`[BusinessTour] Propriétés corrompues pour "${player.name||player.id}" (valeur: ${JSON.stringify(player.properties)}) — origine: ${ctx}`);
    return false;
  }
  return true;
}
function validateAllPlayers(state, ctx){
  if (!state || !Array.isArray(state.players)) return false;
  let ok = true;
  for (const p of state.players) ok = validatePlayer(p, ctx) && ok;
  return ok;
}

async function startGame(){
  if (!gs || gs.phase !== 'waiting') return;
  const state = JSON.parse(JSON.stringify(gs));
  state.phase = 'playing';
  state.startTime = new Date().toISOString();
  // Réinitialisation explicite de TOUS les joueurs (hôte inclus) au lancement
  // pour garantir un état propre et éviter toute valeur fantôme héritée du lobby.
  state.players = state.players.map(p => ({
    id: p.id,
    name: p.name,
    color: p.color,
    money: START_MONEY,
    position: 0,
    properties: [],
    inJail: false,
    jailTurns: 0,
    bankrupt: false,
  }));
  state.houses = {};
  state.currentPlayerIndex = 0;
  state.turnPhase = 'preRoll';
  state.dice = [null, null];
  state.doubleCount = 0;
  state.pendingAction = null;
  state.log = [`🎲 La partie commence avec ${state.players.length} pandas !`];
  validateAllPlayers(state, 'startGame');
  await saveRoom(state);
  gs = state; startTimer(); render();
}

// ===== Actions de tour =====
async function rollDice(){
  if (!gs || rolling) return;
  const cp = gs.players[gs.currentPlayerIndex];
  if (cp.id !== myId || cp.bankrupt) return;
  if (gs.turnPhase !== 'preRoll' && gs.turnPhase !== 'doubleAgain') return;
  if (gs.pendingAction) return;

  rolling = true;
  // Animation locale
  const d1El = document.getElementById('die1');
  const d2El = document.getElementById('die2');
  if (d1El && d2El){
    d1El.classList.add('rolling');
    d2El.classList.add('rolling');
    if (dieAnimTmr) clearInterval(dieAnimTmr);
    dieAnimTmr = setInterval(()=>{
      d1El.textContent = Math.ceil(Math.random()*6);
      d2El.textContent = Math.ceil(Math.random()*6);
    }, 80);
    await new Promise(r=>setTimeout(r, 600));
    clearInterval(dieAnimTmr);
    d1El.classList.remove('rolling');
    d2El.classList.remove('rolling');
  }

  const d1 = Math.ceil(Math.random()*6);
  const d2 = Math.ceil(Math.random()*6);
  const isDouble = d1 === d2;
  const state = JSON.parse(JSON.stringify(gs));
  state.dice = [d1, d2];
  if (isDouble) state.doubleCount = (state.doubleCount || 0) + 1;
  else state.doubleCount = 0;

  const p = state.players[state.currentPlayerIndex];

  // En prison
  if (p.inJail){
    if (isDouble){
      p.inJail = false;
      p.jailTurns = 0;
      state.log.push(`🔓 ${p.name} sort du Zoo avec un double !`);
      await movePlayer(state, p, d1 + d2);
    } else {
      p.jailTurns++;
      state.log.push(`🔒 ${p.name} reste au Zoo (essai ${p.jailTurns}/3).`);
      if (p.jailTurns >= 3){
        p.money -= JAIL_FINE;
        if (p.money < 0){ handleBankruptcyInline(state, p); rolling = false; gs = state; await saveRoom(state); render(); return; }
        p.inJail = false;
        p.jailTurns = 0;
        state.log.push(`💸 ${p.name} paie 50🪙 et sort du Zoo.`);
        await movePlayer(state, p, d1 + d2);
      } else {
        // Fin du tour
        rolling = false;
        gs = state;
        await saveRoom(state);
        render();
        await advanceTurnAfterDelay();
        return;
      }
    }
  } else {
    // 3 doubles d'affilée → zoo
    if (state.doubleCount >= 3){
      p.inJail = true;
      p.jailTurns = 0;
      p.position = JAIL_IDX;
      state.dice = [d1, d2];
      state.doubleCount = 0;
      state.log.push(`🚨 ${p.name} a fait 3 doubles : direct au Zoo !`);
      state.turnPhase = 'postAction';
      rolling = false;
      gs = state;
      await saveRoom(state);
      render();
      return;
    }
    await movePlayer(state, p, d1 + d2);
  }

  rolling = false;
  gs = state;
  await saveRoom(state);
  render();
}

async function movePlayer(state, player, steps){
  const oldPos = player.position;
  let newPos = (oldPos + steps) % 40;
  if (newPos < oldPos || (steps > 0 && newPos === 0)){
    player.money += GO_BONUS;
    state.log.push(`💰 ${player.name} passe par Départ : +${GO_BONUS}🪙`);
  }
  player.position = newPos;
  state.log.push(`🐾 ${player.name} avance de ${steps} → ${TILES[newPos].name}`);
  resolveTileAction(state, player);
}

function resolveTileAction(state, player){
  const t = TILES[player.position];
  state.turnPhase = 'acting';

  if (t.type === 'corner-go'){
    state.turnPhase = setPhaseAfter(state);
    return;
  }
  if (t.type === 'corner-parking'){
    state.log.push(`🌿 ${player.name} se repose à la Bambouseraie.`);
    state.turnPhase = setPhaseAfter(state);
    return;
  }
  if (t.type === 'corner-jail'){
    // visite seulement
    state.turnPhase = setPhaseAfter(state);
    return;
  }
  if (t.type === 'corner-gojail'){
    player.inJail = true;
    player.jailTurns = 0;
    player.position = JAIL_IDX;
    state.doubleCount = 0;
    state.log.push(`🚓 ${player.name} est envoyé au Zoo !`);
    state.turnPhase = 'postAction';
    return;
  }
  if (t.type === 'tax'){
    state.pendingAction = { type:'tax', tileIdx: player.position };
    return;
  }
  if (t.type === 'carte' || t.type === 'caisse'){
    const deck = t.type === 'caisse' ? CAISSE_PANDA_CARDS : CARTES_BAMBOU;
    const card = deck[Math.floor(Math.random() * deck.length)];
    state.pendingAction = { type:'card', deck: t.type, msg: card.msg, effect: card.effect };
    return;
  }
  // Property / station / company
  if (t.type === 'property' || t.type === 'station' || t.type === 'company'){
    const owner = state.players.find(p=>!p.bankrupt && p.properties.includes(player.position));
    if (!owner){
      // libre → option achat
      state.pendingAction = { type:'buy', tileIdx: player.position };
      return;
    }
    if (owner.id === player.id){
      // chez soi
      state.log.push(`🏡 ${player.name} est chez lui.`);
      state.turnPhase = setPhaseAfter(state);
      return;
    }
    // payer loyer
    const amount = getRent(state, player.position, state.dice);
    state.pendingAction = { type:'rent', tileIdx: player.position, amount, fromId: player.id, toId: owner.id };
    return;
  }
}

function setPhaseAfter(state){
  // si double et toujours en jeu → doubleAgain, sinon postAction
  if (state.dice && state.dice[0] === state.dice[1] && !state.players[state.currentPlayerIndex].inJail){
    return 'doubleAgain';
  }
  return 'postAction';
}

async function actionBuy(){
  if (!gs.pendingAction || gs.pendingAction.type !== 'buy') return;
  const state = JSON.parse(JSON.stringify(gs));
  const p = state.players[state.currentPlayerIndex];
  const t = TILES[state.pendingAction.tileIdx];
  if (!validatePlayer(p, 'actionBuy:pre')) return;
  if (p.money < t.price) return;
  p.money -= t.price;
  p.properties.push(state.pendingAction.tileIdx);
  validatePlayer(p, 'actionBuy:post');
  state.log.push(`🛒 ${p.name} achète ${t.name} pour ${t.price}🪙.`);
  state.pendingAction = null;
  state.turnPhase = setPhaseAfter(state);
  gs = state; await saveRoom(state); render();
}

async function actionSkipBuy(){
  if (!gs.pendingAction || gs.pendingAction.type !== 'buy') return;
  const state = JSON.parse(JSON.stringify(gs));
  state.log.push(`👋 ${state.players[state.currentPlayerIndex].name} passe son tour d'achat.`);
  state.pendingAction = null;
  state.turnPhase = setPhaseAfter(state);
  gs = state; await saveRoom(state); render();
}

async function actionPayRent(){
  if (!gs.pendingAction || gs.pendingAction.type !== 'rent') return;
  const state = JSON.parse(JSON.stringify(gs));
  const pa = state.pendingAction;
  const payer = state.players[state.currentPlayerIndex];
  const owner = state.players.find(p=>p.id===pa.toId);
  if (!validatePlayer(payer, 'actionPayRent:payer') || !validatePlayer(owner, 'actionPayRent:owner')) return;
  if (typeof pa.amount !== 'number' || !Number.isFinite(pa.amount)){
    console.error(`[BusinessTour] Montant de loyer invalide (${JSON.stringify(pa.amount)}) — origine: actionPayRent`);
    return;
  }
  if (payer.money >= pa.amount){
    payer.money -= pa.amount;
    owner.money += pa.amount;
    validatePlayer(payer, 'actionPayRent:post-payer');
    validatePlayer(owner, 'actionPayRent:post-owner');
    state.log.push(`💸 ${payer.name} paie ${pa.amount}🪙 à ${owner.name}.`);
    state.pendingAction = null;
    state.turnPhase = setPhaseAfter(state);
  } else {
    handleBankruptcyInline(state, payer);
  }
  gs = state; await saveRoom(state); render();
}

async function actionPayTax(){
  if (!gs.pendingAction || gs.pendingAction.type !== 'tax') return;
  const state = JSON.parse(JSON.stringify(gs));
  const t = TILES[state.pendingAction.tileIdx];
  const p = state.players[state.currentPlayerIndex];
  if (p.money >= t.amount){
    p.money -= t.amount;
    state.log.push(`💸 ${p.name} paie ${t.amount}🪙 (${t.name}).`);
    state.pendingAction = null;
    state.turnPhase = setPhaseAfter(state);
  } else {
    handleBankruptcyInline(state, p);
  }
  gs = state; await saveRoom(state); render();
}

async function actionResolveCard(){
  if (!gs.pendingAction || gs.pendingAction.type !== 'card') return;
  const state = JSON.parse(JSON.stringify(gs));
  const pa = state.pendingAction;
  const p = state.players[state.currentPlayerIndex];
  const eff = pa.effect;
  if (!validatePlayer(p, 'actionResolveCard:pre')) return;
  if (!eff || typeof eff.type !== 'string'){
    console.error(`[BusinessTour] Effet de carte invalide (${JSON.stringify(eff)}) — origine: actionResolveCard`);
    return;
  }
  state.log.push(`🎴 ${p.name} : ${pa.msg}`);

  if (eff.type === 'money'){
    if (typeof eff.amount !== 'number'){
      console.error(`[BusinessTour] Carte 'money' sans montant valide (${JSON.stringify(eff.amount)}) — origine: actionResolveCard`);
      return;
    }
    p.money += eff.amount;
    validatePlayer(p, 'actionResolveCard:money');
    if (p.money < 0){ handleBankruptcyInline(state, p); gs = state; await saveRoom(state); render(); return; }
    state.pendingAction = null;
    state.turnPhase = setPhaseAfter(state);
  } else if (eff.type === 'collectAll'){
    if (typeof eff.amount !== 'number'){
      console.error(`[BusinessTour] Carte 'collectAll' sans montant valide — origine: actionResolveCard`);
      return;
    }
    for (const other of state.players){
      if (other.id === p.id || other.bankrupt) continue;
      if (!validatePlayer(other, 'actionResolveCard:collectAll:other')) continue;
      const take = Math.min(eff.amount, other.money);
      other.money -= take;
      p.money += take;
    }
    validatePlayer(p, 'actionResolveCard:collectAll:post');
    state.pendingAction = null;
    state.turnPhase = setPhaseAfter(state);
  } else if (eff.type === 'moveDelta'){
    state.pendingAction = null;
    const newPos = ((p.position + eff.delta) % 40 + 40) % 40;
    p.position = newPos;
    state.log.push(`🐾 ${p.name} arrive sur ${TILES[newPos].name}.`);
    resolveTileAction(state, p);
  } else if (eff.type === 'moveTo'){
    state.pendingAction = null;
    let target = eff.target;
    if (eff.kind === 'station'){
      target = STATION_IDX.find(idx => idx > p.position);
      if (target === undefined) target = STATION_IDX[0];
    }
    if (target < p.position){
      p.money += GO_BONUS;
      state.log.push(`💰 ${p.name} passe par Départ : +${GO_BONUS}🪙`);
    }
    p.position = target;
    state.log.push(`🐾 ${p.name} arrive sur ${TILES[target].name}.`);
    resolveTileAction(state, p);
  } else if (eff.type === 'jail'){
    p.inJail = true;
    p.jailTurns = 0;
    p.position = JAIL_IDX;
    state.doubleCount = 0;
    state.pendingAction = null;
    state.turnPhase = 'postAction';
  }
  gs = state; await saveRoom(state); render();
}

async function actionDismissInfo(){
  if (!gs.pendingAction || gs.pendingAction.type !== 'info') return;
  const state = JSON.parse(JSON.stringify(gs));
  state.pendingAction = null;
  state.turnPhase = setPhaseAfter(state);
  gs = state; await saveRoom(state); render();
}

async function actionConfirmBankrupt(){
  if (!gs.pendingAction || gs.pendingAction.type !== 'bankrupt') return;
  const state = JSON.parse(JSON.stringify(gs));
  state.pendingAction = null;
  // Vérifier si la partie est finie (un seul restant)
  const remaining = state.players.filter(p=>!p.bankrupt);
  if (remaining.length <= 1){
    state.phase = 'finished';
    state.log.push(`🏆 ${remaining[0].name} remporte la partie !`);
  } else {
    state.turnPhase = 'postAction';
  }
  gs = state; await saveRoom(state); render();
}

function handleBankruptcyInline(state, player){
  player.bankrupt = true;
  player.money = 0;
  // Libérer les propriétés
  for (const idx of player.properties){
    if (state.houses) delete state.houses[idx];
  }
  player.properties = [];
  state.log.push(`💥 ${player.name} est en faillite ! Ses propriétés retournent au marché.`);
  state.pendingAction = { type:'bankrupt', playerIdx: state.players.indexOf(player) };
}

async function payJail(){
  const state = JSON.parse(JSON.stringify(gs));
  const p = state.players[state.currentPlayerIndex];
  if (p.id !== myId || !p.inJail) return;
  if (p.money < JAIL_FINE){ showError('Pas assez de bambou !'); return; }
  p.money -= JAIL_FINE;
  p.inJail = false;
  p.jailTurns = 0;
  state.log.push(`💸 ${p.name} paie 50🪙 et sort du Zoo.`);
  gs = state; await saveRoom(state); render();
}

async function endTurn(){
  if (!gs || gs.turnPhase !== 'postAction') return;
  const cp = gs.players[gs.currentPlayerIndex];
  if (cp.id !== myId) return;
  await advanceTurn();
}

async function advanceTurnAfterDelay(){
  await new Promise(r=>setTimeout(r, 500));
  await advanceTurn();
}

async function advanceTurn(){
  const state = JSON.parse(JSON.stringify(gs));
  // Trouver le prochain joueur non en faillite
  let next = state.currentPlayerIndex;
  let safety = 0;
  do {
    next = (next + 1) % state.players.length;
    safety++;
    if (safety > state.players.length + 1) break;
  } while (state.players[next].bankrupt);
  state.currentPlayerIndex = next;
  state.dice = [null, null];
  state.doubleCount = 0;
  state.turnPhase = 'preRoll';
  state.pendingAction = null;
  gs = state; await saveRoom(state); render();
}

// ===== Construction =====
function openBuildPanel(){
  const cp = gs.players[gs.currentPlayerIndex];
  if (cp.id !== myId) return;
  const groups = [];
  for (const color in COLOR_GROUPS){
    const idxs = COLOR_GROUPS[color];
    if (!idxs.every(i => cp.properties.includes(i))) continue;
    const minH = Math.min(...idxs.map(i => gs.houses[i] || 0));
    const t = TILES[idxs[0]];
    groups.push({ color, idxs, minH, cost: t.houseCost });
  }
  if (groups.length === 0) return;
  const rows = groups.map(g=>{
    return `
      <div class="build-row">
        <div class="br-color ${g.color}"></div>
        <div style="flex:1">
          <div class="br-name">Groupe ${labelColor(g.color)}</div>
          <div class="br-houses">Niveau actuel : ${g.minH}/5 — ${g.cost}🪙 / maison</div>
        </div>
        <button class="br-add" onclick="buildOne('${g.color}')" ${g.minH >= 5 || cp.money < g.cost ? 'disabled' : ''}>+</button>
      </div>
    `;
  }).join('');
  showModal(`
    <div class="modal-icon">🏠</div>
    <div class="modal-title">Construire</div>
    <div class="modal-text" style="font-size:12px">Construis sur les groupes complets que tu possèdes.</div>
    <div class="build-list">${rows}</div>
    <div class="modal-actions">
      <button class="btn-grey" onclick="hideModal()">Fermer</button>
    </div>
  `);
}

function labelColor(c){
  return { violet:'Violet 🌸', lightblue:'Bleu clair 💧', pink:'Rose 🌷', orange:'Orange 🦊', red:'Rouge 🔥', yellow:'Jaune ☀️', green:'Vert 🌿', darkblue:'Bleu foncé 🌊' }[c] || c;
}

async function buildOne(color){
  const state = JSON.parse(JSON.stringify(gs));
  const cp = state.players[state.currentPlayerIndex];
  const idxs = COLOR_GROUPS[color];
  const minH = Math.min(...idxs.map(i => state.houses[i] || 0));
  // Construire sur la propriété la moins développée du groupe
  const target = idxs.find(i => (state.houses[i] || 0) === minH);
  const t = TILES[target];
  if (cp.money < t.houseCost) return;
  if (minH >= 5) return;
  cp.money -= t.houseCost;
  state.houses[target] = (state.houses[target] || 0) + 1;
  const lvl = state.houses[target];
  state.log.push(`🏠 ${cp.name} construit sur ${t.name} (niveau ${lvl===5?'Hôtel':lvl}).`);
  gs = state; await saveRoom(state); render();
  openBuildPanel();
}

// ===== Info d'une case (clic plateau) =====
function showTileInfo(idx){
  const t = TILES[idx];
  let detail = '';
  if (t.type === 'property'){
    detail = `Prix : ${t.price}🪙<br>Loyer base : ${t.rents[0]}🪙<br>Monopole : ${t.rents[1]}🪙<br>1🏠 ${t.rents[2]} • 2🏠 ${t.rents[3]} • 3🏠 ${t.rents[4]} • 4🏠 ${t.rents[5]} • 🏨 ${t.rents[6]}<br>Maison : ${t.houseCost}🪙`;
  } else if (t.type === 'station'){
    detail = `Gare panda<br>Loyer : 25/50/100/200🪙 selon possession`;
  } else if (t.type === 'company'){
    detail = `Compagnie panda<br>Loyer : 4× (ou 10× si 2 compagnies) la valeur des dés`;
  } else if (t.type === 'tax'){
    detail = `Tu paies ${t.amount}🪙`;
  } else if (t.type === 'carte'){
    detail = 'Pioche une Carte Bambou 🎴';
  } else if (t.type === 'caisse'){
    detail = 'Pioche une Caisse Panda 📦';
  } else {
    detail = t.name;
  }
  showModal(`
    <div class="modal-icon">${t.icon || '🏞️'}</div>
    <div class="modal-title">${escapeHtml(t.name)}</div>
    <div class="modal-text">${detail}</div>
    <div class="modal-actions">
      <button class="btn-grey" onclick="hideModal()">Fermer</button>
    </div>
  `);
}

// ===== Événements UI =====
function showError(msg){
  const el = document.getElementById('home-error');
  if (el){ el.textContent = msg; setTimeout(()=>{ if(el.textContent===msg) el.textContent=''; }, 5000); }
}

document.getElementById('color-picker').addEventListener('click', e=>{
  const dot = e.target.closest('.color-dot');
  if (!dot) return;
  document.querySelectorAll('.color-dot').forEach(d=>d.classList.remove('selected'));
  dot.classList.add('selected');
  myColor = dot.dataset.c;
  localStorage.setItem('business_color', myColor);
});

document.getElementById('btn-create').onclick = ()=>{
  myName = document.getElementById('inp-pseudo').value.trim();
  if (!myName){ showError('Entre ton pseudo !'); return; }
  localStorage.setItem('business_pseudo', myName);
  createRoom();
};
document.getElementById('btn-join-toggle').onclick = ()=>{
  document.getElementById('join-panel').classList.toggle('hidden');
  document.getElementById('inp-code').focus();
};
document.getElementById('btn-join').onclick = ()=>{
  myName = document.getElementById('inp-pseudo').value.trim();
  if (!myName){ showError('Entre ton pseudo !'); return; }
  const code = document.getElementById('inp-code').value.trim();
  if (code.length !== 4){ showError('Code à 4 lettres requis.'); return; }
  localStorage.setItem('business_pseudo', myName);
  joinRoom(code);
};
document.getElementById('inp-code').oninput = ()=>{
  const el = document.getElementById('inp-code');
  el.value = el.value.toUpperCase();
};
document.getElementById('inp-code').onkeydown = e=>{
  if (e.key === 'Enter') document.getElementById('btn-join').click();
};
document.getElementById('btn-start').onclick = startGame;
document.getElementById('btn-leave').onclick = async()=>{
  if (gs && gs.phase === 'waiting'){
    const st = JSON.parse(JSON.stringify(gs));
    st.players = st.players.filter(p=>p.id !== myId);
    if (st.players.length === 0){
      await sfetch('DELETE',`/rest/v1/business_rooms?id=eq.${roomId}`);
    } else {
      if (st.host === myId) st.host = st.players[0].id;
      await sfetch('PATCH',`/rest/v1/business_rooms?id=eq.${roomId}`,{state:st,updated_at:new Date().toISOString()});
    }
  }
  stopPoll(); stopTimer(); roomId=''; gs=null; showScreen('screen-home');
};
document.getElementById('btn-replay').onclick = ()=>{
  stopPoll(); stopTimer(); roomId=''; gs=null; showScreen('screen-home');
};

// Restaurer pseudo/couleur
const savedName = localStorage.getItem('business_pseudo');
if (savedName) document.getElementById('inp-pseudo').value = savedName;
const savedColor = localStorage.getItem('business_color');
if (savedColor){
  myColor = savedColor;
  document.querySelectorAll('.color-dot').forEach(d=>{
    d.classList.toggle('selected', d.dataset.c === savedColor);
  });
}

// ===== Calcul dynamique de la taille du plateau =====
// Recalcule --case-size et --board-size selon la taille de la fenêtre,
// en respectant les breakpoints du layout (panneau à droite vs en bas).
function updateBoardSize(){
  const root = document.documentElement;
  const w = window.innerWidth;
  const h = window.innerHeight;

  let maxSize;
  if (w >= 1200){
    // Plateau à gauche, panneau (280px) à droite
    maxSize = Math.min(w - 340, h - 100);
  } else if (w >= 768){
    // Plateau en haut, panneau scrollable en bas
    maxSize = Math.min(w - 40, h - 280);
  } else {
    // Mobile : plateau scrollable horizontalement si besoin
    maxSize = Math.min(w - 24, h - 360);
  }

  // 11 cases + 10 gaps de 2px + 16px de padding interne = 11*case + 36
  let caseSize = Math.floor((maxSize - 36) / 11);
  // Bornes : ne descend pas sous 34px (sinon scroll horizontal), ne dépasse pas 68px
  caseSize = Math.max(34, Math.min(68, caseSize));

  const boardSize = caseSize * 11 + 10 * 2;
  root.style.setProperty('--case-size', `${caseSize}px`);
  root.style.setProperty('--board-size', `${boardSize}px`);
}

// Recalcul au chargement et à chaque redimensionnement
window.addEventListener('resize', updateBoardSize);
window.addEventListener('orientationchange', updateBoardSize);
updateBoardSize();

// Init plateau (vide, sans état)
buildBoard();

// Démarrer le timer dès qu'une partie est en cours
const _origRender = render;
let _timerStarted = false;
function _maybeStartTimer(){
  if (!_timerStarted && gs && gs.phase === 'playing' && gs.startTime){
    _timerStarted = true;
    startTimer();
  }
}
// hook
const _origRenderGame = renderGame;
renderGame = function(){
  _maybeStartTimer();
  return _origRenderGame.apply(this, arguments);
};
